name: 네이버 예약 모니터

on:
  push:                        # push 할 때마다 자동 실행
  schedule:
    - cron: '*/5 * * * *'    # 5분마다 실행
    - cron: '0 22 * * *'    # 매일 한국시간 오전 7시 (지연 감안해 8시 목표)
  workflow_dispatch:           # GitHub Actions 탭에서 수동 실행 가능

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python packages
        run: pip install selenium webdriver-manager requests

      - name: Run monitor
        env:
          CI: "true"
          STATUS_REPORT: ${{ github.event.schedule == '0 23 * * *' && 'true' || 'false' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python naver_booking_bot.py

      - name: Upload screenshot (디버그용)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-${{ github.run_number }}
          path: naver_booking_screenshot.png
          if-no-files-found: ignore
          retention-days: 1
